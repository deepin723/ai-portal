<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>deepin's AI Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7c3aed;
      --primary-light: #9333ea;
      --bg: #0f0e17;
      --surface: #1a1826;
      --border: #2d2b3d;
      --text: #e8e6f0;
      --muted: #8b87a8;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 50%, #9333ea 100%);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 20px rgba(124,58,237,0.4);
      flex-shrink: 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    .header-info h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }

    .header-info p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 6px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
    }

    .tab-btn:hover {
      border-color: var(--primary);
      color: var(--text);
      background: rgba(124,58,237,0.1);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-color: transparent;
      color: white;
      box-shadow: 0 2px 12px rgba(124,58,237,0.4);
    }

    .tab-btn .icon { font-size: 1.05rem; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    iframe.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Loading placeholder ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden { opacity: 0; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status dot ── */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Header -->
    <header class="header">
      <div class="avatar">D</div>
      <div class="header-info">
        <h1>deepin's AI Lab</h1>
        <p>个人 AI 工具集合</p>
      </div>
      <div class="header-badge">✦ 2 tools online</div>
    </header>

    <!-- Tabs -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-index="0">
        <span class="icon">💬</span> AI 对话助手
        <span class="dot"></span>
      </button>
      <button class="tab-btn" data-index="1">
        <span class="icon">🎬</span> AI 视频笔记
        <span class="dot"></span>
      </button>
    </nav>

    <!-- iframes -->
    <div class="iframe-wrap">
      <div class="loading-overlay" id="loading-0">
        <div class="spinner"></div>
        <span>正在加载 AI 对话助手...</span>
      </div>
      <iframe
        id="frame-0"
        src="https://ai-chat-xi-lilac.vercel.app"
        title="AI 对话助手"
      ></iframe>

      <div class="loading-overlay" id="loading-1">
        <div class="spinner"></div>
        <span>正在加载 AI 视频笔记...</span>
      </div>
      <iframe
        id="frame-1"
        src="https://ai-video-notes-jet.vercel.app"
        title="AI 视频笔记"
      ></iframe>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab-btn')
    const frames = document.querySelectorAll('iframe')
    const loadings = document.querySelectorAll('.loading-overlay')
    const loaded = new Set()

    function switchTab(index) {
      tabs.forEach((t, i) => t.classList.toggle('active', i === index))
      frames.forEach((f, i) => f.classList.toggle('visible', i === index))
      loadings.forEach((l, i) => {
        if (i === index && !loaded.has(i)) {
          l.classList.remove('hidden')
        } else {
          l.classList.add('hidden')
        }
      })
    }

    frames.forEach((frame, i) => {
      frame.addEventListener('load', () => {
        loaded.add(i)
        loadings[i].classList.add('hidden')
      })
    })

    tabs.forEach(tab => {
      tab.addEventListener('click', () => switchTab(+tab.dataset.index))
    })

    // Show first tab on load
    switchTab(0)
    frames[0].classList.add('visible')
  </script>
</body>
</html>
